# 自动切换暗凉模式
mode: auto

# 头像
avatar:
  enable: true
  url: /images/avatar.jpg
  status:
    enable: true
    emoji: 😭
    message: 不想变废物
#  🌑

# 社交图标
social:
  - name: GitHub
    link: https://github.com/K8963
    icon: icon-github-line
    color: "#181717"
# 标语动画
banner:
  enable: true
  title: 8963核电站
  src: /js/ui/banner.js
  border: true
  cloud:
    enable: true
    color: "white"
  go_down:
    enable: true
    icon: icon-arrow-down-s-line

# 背景图片
bg_image:
  enable: true
  url: /images/bright.jpg
  dark: /images/dark.jpg
  # blur: 30px # 设置背景模糊程度
  # opacity: 0.1

# 导航
# icon: icon-clipboard-line
menu:
  home:
    path: /
    icon: icon-home-4-line
  list:
    - type: archives
      path: /archives/
      icon: icon-archive-line
    - type: categories
      path: /categories/
      icon: icon-folder-2-line
    - type: tags
      path: /tags/
      icon: icon-price-tag-3-line
  custom:
    title: 我
    path: /about/
    icon: icon-open-arm-line

# 页面链接
pages:
#   - name: 我的小伙伴们
#     url: /links/
#     icon: icon-genderless-line
#     color: dodgerblue

# 图片懒加载
lazyload:
  enable: true

# 打赏
reward:
  enable: false

# 页脚
footer:
  since: 2020
  icon:
    name: icon-cloud-line
    animated: true
    color: "#dfefef"
  powered:
    enable: false
  beian:
    enable: false

# 一言
say:
  enable: true
  api: /data/sentences.json
  hitokoto:
    enable: false

# 鼠标
cursor:
  enable: true

# 卡片透明度
post_card:
  opacity: 0.8

# 文章信息
post_meta:
  item_text: true
  created_at: true
  updated_at: false
  categories: true
  tags: true

# 目录
toc:
  list_number: true
  max_depth: 6
  min_depth: 1
  placeholder: 博主很懒，没有目录
  collapse: false

# 代码高亮-亮暗模式
codeblock:
  copy_btn: true
  prismjs:
    light: default
    dark: tomorrow
